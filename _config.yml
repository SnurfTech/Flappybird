# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : One-Tap Controls
    description                           : Just tap your screen to make your bird flap upwards.
    fontawesome_icon_name                 : fingerprint
    
  - title                                 : Not on the App Store
    description                           : "This app is installed via a mobileconfig. Apple can't remove this app from the App Store if it isn't even there!"
    fontawesome_icon_name                 : store

  - title                                 : Offline Support
    description                           : No internet is required to play Flappybird once you have it installed.
    fontawesome_icon_name                 : wifi

  - title                                 : Keyboard Support
    description                           : Instead of tapping on your screen to fly your bird and restart, you can also use your space key.
    fontawesome_icon_name                 : keyboard

#  - title                                 : High Score Tracking
#    description                           : Saves your personal best locally so you can constantly beat your own record.
#    fontawesome_icon_name                 : mountain
  
  - title                                 : Quick Restart Function
    description                           : Minimal downtime between runs so you can dive right back into the world of infinite pipes. Just tap the screen to restart!
    fontawesome_icon_name                 : arrow-rotate-right

  - title                                 : Completely Free
    description                           : Just like the original Flappybird, this app is completely free.
    fontawesome_icon_name                 : dollar-sign


